<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de SocGeri</title>
    <style>
        /* --- CONFIGURACIÓN GENERAL --- */
        :root {
            --bg-color: #0a0a0c;
            --text-color: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.07); 
            --card-border: rgba(255, 255, 255, 0.1);
            --accent-color: #00d2ff; 
            --glass-blur: blur(12px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            background-image: url('space-bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* --- CABECERA Y BUSCADOR --- */
        header {
            text-align: center;
            margin-bottom: 50px;
            width: 100%;
            max-width: 650px;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 25px;
            font-weight: 300;
            letter-spacing: 1px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .search-bar {
            width: 100%;
            padding: 16px 28px;
            border-radius: 50px;
            border: 1px solid var(--card-border);
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            color: white;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .search-bar:focus {
            outline: none;
            background: rgba(0, 0, 0, 0.6);
            border-color: var(--accent-color);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .container {
            width: 100%;
            max-width: 1300px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .section-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            justify-content: center;
        }

        /* --- TARJETAS (FOLDERS) --- */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 18px;
            padding: 22px;
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .card h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.9);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* --- ENLACES Y LOGOS --- */
        .link-item {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #d1d1d1;
            text-decoration: none;
            padding: 10px;
            border-radius: 10px;
            transition: all 0.2s ease;
            font-size: 0.95rem;
        }

        .link-item:hover {
            background: rgba(255,255,255,0.1);
            color: var(--accent-color);
            padding-left: 15px;
        }

        /* CONFIGURACIÓN DE LOGOS SUBIDOS */
        .logo { 
            width: 22px; 
            height: 22px; 
            background-size: contain; 
            background-repeat: no-repeat; 
            background-position: center;
        }

        /* Mapeo exacto de tus nombres de archivo */
        .logo-gmail     { background-image: url('Gmail.png'); }
        .logo-drive     { background-image: url('Drive.png'); }
        .logo-netflix   { background-image: url('Netflix.png'); }
        .logo-youtube   { background-image: url('Youtube.png'); }
        .logo-movistar  { background-image: url('Movistar.png'); }
        .logo-twitch    { background-image: url('Twitch.png'); }
        .logo-prime     { background-image: url('PrimeVideo.png'); }
        .logo-chatgpt   { background-image: url('ChatGPT.png'); }
        .logo-gemini    { background-image: url('Gemini.png'); }
        .logo-agalla    { background-image: url('Agalla.png'); }
        .logo-cyclezen  { background-image: url('CycleZen19.png'); }

        /* Ajuste para la sección Watch en dos columnas */
        .watch-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
        }

        @media (max-width: 600px) {
            .watch-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>Bienvenido Sr. SocGeri</h1>
    <form action="https://www.google.com/search" method="get">
        <input type="text" name="q" class="search-bar" placeholder="Buscar en Google..." autofocus>
    </form>
</header>

<div class="container">
    <div class="section-grid">
        <div class="card">
            <h2>SocGeri</h2>
            <a href="https://mail.google.com/mail/u/0/" class="link-item"><div class="logo logo-gmail"></div> Gmail</a>
            <a href="https://drive.google.com/drive/u/0/" class="link-item"><div class="logo logo-drive"></div> Drive</a>
        </div>
        
        <div class="card">
            <h2>PenDrive</h2>
            <a href="https://mail.google.com/mail/u/3/" class="link-item"><div class="logo logo-gmail"></div> Gmail</a>
            <a href="https://drive.google.com/drive/u/3/" class="link-item"><div class="logo logo-drive"></div> Drive</a>
        </div>
        
        <div class="card">
            <h2>Castilla</h2>
            <a href="https://mail.google.com/mail/u/2/" class="link-item"><div class="logo logo-gmail"></div> Gmail</a>
            <a href="https://drive.google.com/drive/u/2/" class="link-item"><div class="logo logo-drive"></div> Drive</a>
        </div>
        
        <div class="card">
            <h2>CycleZen 19</h2>
            <a href="https://mail.google.com/mail/u/1/" class="link-item"><div class="logo logo-cyclezen"></div> Gmail</a>
            <a href="https://drive.google.com/drive/u/1/" class="link-item"><div class="logo logo-cyclezen"></div> Drive</a>
        </div>
        
        <div class="card">
            <h2>AGALLA</h2>
            <a href="https://mail.google.com/mail/u/4/" class="link-item"><div class="logo logo-agalla"></div> Gmail</a>
            <a href="https://drive.google.com/drive/u/4/" class="link-item"><div class="logo logo-drive"></div> Drive</a>
        </div>
    </div>

    <div class="section-grid" style="justify-content: center;">
        <div class="card" style="max-width: 450px;">
            <h2>Watch</h2>
            <div class="watch-grid">
                <a href="https://www.netflix.com/" class="link-item"><div class="logo logo-netflix"></div> Netflix</a>
                <a href="https://www.youtube.com/" class="link-item"><div class="logo logo-youtube"></div> YouTube</a>
                <a href="https://ver.movistarplus.es/" class="link-item"><div class="logo logo-movistar"></div> Movistar+</a>
                <a href="https://www.twitch.tv/" class="link-item"><div class="logo logo-twitch"></div> Twitch</a>
                <a href="https://www.primevideo.com/" class="link-item"><div class="logo logo-prime"></div> Prime Video</a>
            </div>
        </div>

        <div class="card" style="max-width: 350px;">
            <h2>IA</h2>
            <a href="https://chatgpt.com/" class="link-item"><div class="logo logo-chatgpt"></div> ChatGPT</a>
            <a href="https://gemini.google.com/" class="link-item"><div class="logo logo-gemini"></div> Gemini</a>
        </div>
    </div>
</div>

</body>
</html>
